<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Applied AI Music Recommender Architecture</title>
  <desc id="desc">Data flow from human request through retrieval, profile inference, guardrails, scoring, recommendations, and evaluation.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155"/>
    </marker>
    <style>
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
      .accent { fill: #ecfeff; stroke: #0f766e; }
      .test { fill: #fff7ed; stroke: #c2410c; }
      .text { font: 16px Arial, sans-serif; fill: #0f172a; }
      .small { font: 13px Arial, sans-serif; fill: #334155; }
      .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect x="30" y="210" width="150" height="70" class="box"/>
  <text x="105" y="238" text-anchor="middle" class="text">Human</text>
  <text x="105" y="260" text-anchor="middle" class="small">music request</text>
  <rect x="230" y="210" width="170" height="70" class="box accent"/>
  <text x="315" y="238" text-anchor="middle" class="text">AppliedMusicAgent</text>
  <text x="315" y="260" text-anchor="middle" class="small">plans observable steps</text>
  <rect x="470" y="80" width="160" height="70" class="box"/>
  <text x="550" y="108" text-anchor="middle" class="text">Retriever</text>
  <text x="550" y="130" text-anchor="middle" class="small">keyword overlap</text>
  <rect x="700" y="30" width="160" height="65" class="box"/>
  <text x="780" y="58" text-anchor="middle" class="text">Knowledge Docs</text>
  <text x="780" y="79" text-anchor="middle" class="small">guidelines, maps</text>
  <rect x="700" y="125" width="160" height="65" class="box"/>
  <text x="780" y="153" text-anchor="middle" class="text">Song CSV</text>
  <text x="780" y="174" text-anchor="middle" class="small">catalog metadata</text>
  <rect x="470" y="210" width="160" height="70" class="box"/>
  <text x="550" y="238" text-anchor="middle" class="text">Profile Inference</text>
  <text x="550" y="260" text-anchor="middle" class="small">mood, genre, targets</text>
  <rect x="700" y="210" width="160" height="70" class="box accent"/>
  <text x="780" y="238" text-anchor="middle" class="text">Guardrails</text>
  <text x="780" y="260" text-anchor="middle" class="small">conflicts, uncertainty</text>
  <rect x="930" y="210" width="160" height="70" class="box"/>
  <text x="1010" y="238" text-anchor="middle" class="text">Scorer</text>
  <text x="1010" y="260" text-anchor="middle" class="small">ranked songs</text>
  <rect x="700" y="340" width="190" height="80" class="box accent"/>
  <text x="795" y="371" text-anchor="middle" class="text">Output</text>
  <text x="795" y="394" text-anchor="middle" class="small">recommendations, reasons, confidence</text>
  <rect x="930" y="340" width="160" height="80" class="box test"/>
  <text x="1010" y="371" text-anchor="middle" class="text">Evaluator</text>
  <text x="1010" y="394" text-anchor="middle" class="small">pass/fail checks</text>
  <path d="M180 245 H230" class="line"/>
  <path d="M400 235 C430 180 440 130 470 115" class="line"/>
  <path d="M630 105 C660 75 670 65 700 63" class="line"/>
  <path d="M630 125 C660 140 670 155 700 158" class="line"/>
  <path d="M400 245 H470" class="line"/>
  <path d="M630 245 H700" class="line"/>
  <path d="M860 245 H930" class="line"/>
  <path d="M1010 280 C1000 325 925 362 890 375" class="line"/>
  <path d="M890 380 H930" class="line"/>
</svg>
